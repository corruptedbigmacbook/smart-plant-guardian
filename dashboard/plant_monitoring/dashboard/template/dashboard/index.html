<!DOCTYPE html>
<html>
	<head>
 <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">	
    <title>
			dashboard
		</title>
	</head>

	<body>
		<div class = "container">
			<div class  ="row">
				{{%for label in labels}}
				<div class = "col-lg-4">

					<div class = "card">
						<div class= "card-body">
							<h5 class="card-title">label.title</h5>
							<p class="card-text" id ="{{label.value_id}}"> </p>
						</div>
					</div>
	
				</div>
				{{% endfor %}}
			</div>
		</div>

	<div class="card border-warning h-100">
		  <div class="card-body">
    			<h6 class="text-warning">Alert</h6>
   			<div id = "alerts-container"></div>
  		</div>
	</div>

	</body>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
	
	 <script>
	//loading latest readings using api end points
		function LatestReadings(){
		fetch("/readings/api")
  		.then(response => response.json())
  		.then(data => {
      	document.getElementById("timestamp-value").textContent = data.data[0].timestamp;
	document.getElementById("pressure-value").textContent = data.data[0].pressure;
	document.getElementById("temperature-value").textContent = data.data[0].temperature;
	document.getElementById("humidity-value").textContent = data.data[0].humidity;
	document.getElementById("soil-moisture-value").textContent = data.data[0].soil_moisture;
	document.getElementById("light-value").textContent = data.data[0].light_intensity ;  });	
		}




	//loading letest alerts using api endpoint

	function renderAlerts(alerts) {
    container.innerHTML = "";

    alerts.forEach(alert => {
        const div = document.createElement("div");
        div.className = "alert alert-warning mb-2";

        const date = new Date(alert.time);

        div.innerHTML = `
            <div class="d-flex justify-content-between">
                <span>${alert.message}</span>
                <small class="text-muted">${date.toLocaleTimeString()}</small>
            </div>
        `;

        container.appendChild(div);
    });
}	

async function loadAlerts() {
    const response = await fetch("/alert/api");
    const data = await response.json();

    renderAlerts(data.alerts);
}

setInterval(loadAlerts, 5000);
loadAlerts();

	</script>
